<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SW231 Messenger</title>
  <link rel="stylesheet" href="/css/chat.css">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-ring r2"></div>
    <div class="loader-ring r3"></div>
    <div class="loader-core"></div>
    <div class="loader-text">SW231</div>
    <div class="loader-sub">Loading...</div>
  </div>

  <div id="auth-screen" class="auth-screen" style="display:none;">
    <div class="auth-container">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Login</button>
        <button type="button" class="auth-tab" data-tab="register">Register</button>
      </div>
      <form id="auth-form" class="auth-form">
        <div id="register-fields" style="display:none;">
          <div class="field">
            <label>Display Name</label>
            <input type="text" id="reg-displayname" placeholder="Nama tampilan Anda">
          </div>
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="auth-username" placeholder="Username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="auth-password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-main" id="auth-submit">Login</button>
        <div id="auth-msg" class="auth-msg"></div>
      </form>
    </div>
  </div>

  <div id="app" class="app" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="user-info">
          <div class="avatar" id="my-avatar"></div>
          <div>
            <div class="user-name" id="my-name"></div>
            <div class="user-status">Online</div>
          </div>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn" id="new-chat-btn" title="New Chat">&#9998;</button>
          <button class="icon-btn" id="new-group-btn" title="New Group">&#128101;</button>
        </div>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search or start new chat...">
      </div>
      <div class="conversations-list" id="conversations-list"></div>
    </aside>

    <main class="chat-area" id="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <div class="placeholder-icon">&#128172;</div>
        <h2>SW231 Messenger</h2>
        <p>Select a conversation or start a new one</p>
      </div>

      <div class="chat-active" id="chat-active" style="display:none;">
        <header class="chat-header" id="chat-header">
          <button class="icon-btn back-btn" id="back-btn">&#8592;</button>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-name"></div>
            <div class="chat-header-status" id="chat-status"></div>
          </div>
          <div class="chat-header-actions">
            <button class="icon-btn" id="members-btn" title="Members">&#128101;</button>
          </div>
        </header>

        <div class="messages-container" id="messages-container"></div>

        <div class="typing-indicator" id="typing-indicator" style="display:none;">
          <span id="typing-text"></span>
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>

        <div class="reply-preview" id="reply-preview" style="display:none;">
          <div class="reply-info">
            <span class="reply-to-name" id="reply-to-name"></span>
            <span class="reply-to-text" id="reply-to-text"></span>
          </div>
          <button class="reply-close" id="reply-close">&times;</button>
        </div>

        <div class="edit-preview" id="edit-preview" style="display:none;">
          <div class="edit-info">
            <span>Editing message</span>
          </div>
          <button class="reply-close" id="edit-close">&times;</button>
        </div>

        <footer class="chat-input-area">
          <input type="file" id="file-input-image" accept="image/*" style="display:none">
          <input type="file" id="file-input-video" accept="video/*" style="display:none">
          <input type="file" id="file-input-audio" accept="audio/*" style="display:none">
          <input type="file" id="file-input-file" style="display:none">

          <div style="position:relative;">
            <button class="attach-btn" id="attach-btn" title="Attach">&#128206;</button>
            <div class="attach-menu" id="attach-menu">
              <button class="attach-menu-item" data-type="image"><span class="attach-icon">&#128247;</span> Photo</button>
              <button class="attach-menu-item" data-type="video"><span class="attach-icon">&#127909;</span> Video</button>
              <button class="attach-menu-item" data-type="audio"><span class="attach-icon">&#127925;</span> Audio / Music</button>
              <button class="attach-menu-item" data-type="file"><span class="attach-icon">&#128194;</span> Document</button>
            </div>
          </div>

          <div class="emoji-picker-trigger" id="emoji-trigger">&#128512;</div>
          <button class="attach-btn" id="sticker-btn" title="Stickers">&#128571;</button>

          <div id="voice-mode" style="display:none; width:100%;">
            <div class="voice-recorder">
              <div class="voice-wave" id="voice-wave"></div>
              <span class="voice-timer" id="voice-timer">0:00</span>
              <button class="voice-cancel" id="voice-cancel">&#10005;</button>
              <button class="voice-send" id="voice-send">&#10148;</button>
            </div>
          </div>

          <div id="text-mode" style="display:flex; flex:1; align-items:flex-end; gap:10px;">
            <div class="input-wrapper">
              <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="send-btn">&#10148;</button>
          </div>

          <button class="attach-btn" id="voice-btn" title="Voice Message" style="font-size:22px;">&#127908;</button>
        </footer>

        <div class="emoji-picker" id="emoji-picker" style="display:none;">
          <div class="emoji-picker-header">
            <input type="text" id="emoji-search" placeholder="Search emoji...">
            <div class="emoji-categories">
              <button class="emoji-cat active" data-cat="smileys">&#128512;</button>
              <button class="emoji-cat" data-cat="people">&#128104;</button>
              <button class="emoji-cat" data-cat="nature">&#127807;</button>
              <button class="emoji-cat" data-cat="food">&#127828;</button>
              <button class="emoji-cat" data-cat="travel">&#9992;</button>
              <button class="emoji-cat" data-cat="objects">&#128187;</button>
              <button class="emoji-cat" data-cat="symbols">&#10084;</button>
            </div>
          </div>
          <div class="emoji-grid" id="emoji-grid"></div>
        </div>

        <div class="sticker-panel" id="sticker-panel">
          <div class="sticker-tabs" id="sticker-tabs"></div>
          <div class="sticker-grid" id="sticker-grid"></div>
        </div>

        <div class="reaction-picker" id="reaction-picker" style="display:none;">
          <button class="reaction-btn" data-emoji="&#128077;">&#128077;</button>
          <button class="reaction-btn" data-emoji="&#10084;">&#10084;</button>
          <button class="reaction-btn" data-emoji="&#128514;">&#128514;</button>
          <button class="reaction-btn" data-emoji="&#128558;">&#128558;</button>
          <button class="reaction-btn" data-emoji="&#128557;">&#128557;</button>
          <button class="reaction-btn" data-emoji="&#128293;">&#128293;</button>
          <button class="reaction-btn" data-emoji="&#128079;">&#128079;</button>
          <button class="reaction-btn" data-emoji="&#128164;">&#128164;</button>
        </div>
      </div>
    </main>

    <div class="members-panel" id="members-panel" style="display:none;">
      <div class="members-header">
        <h3>Members</h3>
        <button class="icon-btn" id="close-members">&times;</button>
      </div>
      <div class="members-list" id="members-list"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay" style="display:none;">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <button class="icon-btn" id="close-modal">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <div class="lightbox" id="lightbox" style="display:none;"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
